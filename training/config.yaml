# YOLOv8 training configuration for license plate detection
# Edit hyperparameters here or pass --overrides to train.py

# ─── Model ────────────────────────────────────────────────────────────────────
model: yolov8s.pt          # yolov8n.pt (fastest) | yolov8s.pt (balanced) | yolov8m.pt (accurate)
task: detect

# ─── Dataset ──────────────────────────────────────────────────────────────────
data: datasets/license_plates/data.yaml

# ─── Training ─────────────────────────────────────────────────────────────────
epochs: 100
patience: 20               # early stopping: stop if no improvement for 20 epochs
batch: 16                  # reduce to 8 if GPU VRAM < 8 GB
imgsz: 640
workers: 4
device: ""                 # "" = auto-detect (GPU if available, else CPU)
seed: 42

# ─── Optimiser ────────────────────────────────────────────────────────────────
optimizer: AdamW
lr0: 0.001
lrf: 0.01                  # final LR = lr0 * lrf
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3.0

# ─── Augmentation ─────────────────────────────────────────────────────────────
# Aggressive augmentation improves robustness on difficult conditions:
# low light, motion blur, angled plates, partial occlusion
hsv_h: 0.015               # hue jitter (handles colour casts)
hsv_s: 0.7                 # saturation jitter
hsv_v: 0.4                 # value/brightness jitter (low-light simulation)
degrees: 5.0               # random rotation (angled plates)
translate: 0.1
scale: 0.5
shear: 2.0                 # slight perspective distortion
perspective: 0.0005        # fisheye-like distortion
flipud: 0.0                # plates don't appear upside down
fliplr: 0.5                # horizontal flip is valid
mosaic: 1.0                # mosaic augmentation (multiple vehicles)
mixup: 0.1                 # mix two training images
copy_paste: 0.1            # copy-paste augmentation for crowded scenes
blur: 0.01                 # motion blur simulation
median_blur: 0.01

# ─── Output ───────────────────────────────────────────────────────────────────
project: runs/train
name: plate_detector
save: true
save_period: 10            # save checkpoint every 10 epochs
plots: true                # generate training curves
